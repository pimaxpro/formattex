<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PimaX Tool — Chuẩn Hóa LaTeX</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .theme-btn-pimax {
      background-color: #dc2626;
      color: #ffffff;
    }
    .theme-btn-pimax:hover {
      background-color: #b91c1c;
    }
    textarea {
      font-family: 'Courier New', Courier, monospace;
      resize: none;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex flex-col">

  <!-- HEADER -->
  <header class="bg-red-700 text-white px-6 py-3 shadow flex justify-between items-center">
    <div class="flex items-center space-x-3">
      <i data-lucide="file-code-2" class="w-6 h-6"></i>
      <h1 class="font-bold text-lg tracking-wide">PIMAX TOOL — CHUẨN HÓA LATEX</h1>
    </div>
    <div id="sub-mode-desc" class="text-xs bg-red-800 px-3 py-1 rounded border border-red-600">
      Chế độ: <b>Trắc nghiệm 4 phương án (\choice)</b>
    </div>
  </header>

  <!-- MAIN NAVIGATION & SUB MODES -->
  <div class="bg-white border-b border-slate-200 px-6 py-2 flex flex-wrap justify-between items-center gap-4">
    
    <!-- SUB-MODES FOR FUNCTION 1 -->
    <div class="flex items-center space-x-2">
      <span class="text-xs font-bold text-slate-500 mr-2">CHỌN DẠNG CÂU HỎI:</span>
      
      <button id="sub-btn-1" onclick="switchSubMode(1)" 
        class="px-3 py-1.5 text-xs font-bold rounded transition flex items-center space-x-1.5 theme-btn-pimax">
        <i data-lucide="check-square" class="w-4 h-4"></i>
        <span>CN 1: Trắc nghiệm (\choice)</span>
      </button>

      <button id="sub-btn-2" onclick="switchSubMode(2)" 
        class="px-3 py-1.5 text-xs font-semibold rounded transition flex items-center space-x-1.5 bg-slate-100 text-slate-700 hover:bg-slate-200">
        <i data-lucide="list-checks" class="w-4 h-4"></i>
        <span>CN 2: Đúng / Sai (\choiceTF)</span>
      </button>

      <button id="sub-btn-3" onclick="switchSubMode(3)" 
        class="px-3 py-1.5 text-xs font-semibold rounded transition flex items-center space-x-1.5 bg-slate-100 text-slate-700 hover:bg-slate-200">
        <i data-lucide="text-cursor-input" class="w-4 h-4"></i>
        <span>CN 3: Trả lời ngắn (\shortans)</span>
      </button>
    </div>

    <!-- MAIN CONVERT BUTTON -->
    <button onclick="processExEnvironment()" 
      class="px-5 py-2 text-xs font-bold rounded shadow transition flex items-center space-x-2 theme-btn-pimax">
      <i data-lucide="wand-2" class="w-4 h-4"></i>
      <span id="btn-ex-label">Chuẩn Hóa Ngay (CN 1)</span>
    </button>
  </div>

  <!-- WORKSPACE EDITOR -->
  <main class="flex-1 p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
    
    <!-- INPUT AREA -->
    <div class="flex flex-col bg-white border border-slate-300 shadow-sm rounded">
      <div class="bg-slate-50 border-b border-slate-200 px-4 py-2 flex justify-between items-center">
        <span class="text-xs font-bold text-slate-700 flex items-center space-x-1">
          <i data-lucide="file-input" class="w-4 h-4 text-slate-500"></i>
          <span>DỮ LIỆU THÔ ĐẦU VÀO</span>
        </span>
        <button onclick="document.getElementById('input-ex').value='';" class="text-xs text-red-600 hover:underline">Xóa tất cả</button>
      </div>
      <textarea id="input-ex" class="flex-1 p-4 text-sm border-none outline-none focus:ring-0" placeholder="Dán văn bản câu hỏi thô vào đây..."></textarea>
    </div>

    <!-- OUTPUT AREA -->
    <div class="flex flex-col bg-white border border-slate-300 shadow-sm rounded">
      <div class="bg-slate-50 border-b border-slate-200 px-4 py-2 flex justify-between items-center">
        <span class="text-xs font-bold text-slate-700 flex items-center space-x-1">
          <i data-lucide="file-output" class="w-4 h-4 text-slate-500"></i>
          <span>KẾT QUẢ MÃ LATEX CHUẨN</span>
        </span>
        
        <!-- TOOLBAR ACTION BUTTONS -->
        <div class="flex items-center space-x-2">
          <button onclick="copyOutput()" title="Sao chép" 
            class="px-3 py-1 text-xs font-bold bg-slate-200 hover:bg-slate-300 text-slate-800 rounded flex items-center space-x-1">
            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
            <span>Copy</span>
          </button>
          
          <button onclick="downloadOutput()" title="Tải file .tex" 
            class="px-3 py-1 text-xs font-bold bg-slate-200 hover:bg-slate-300 text-slate-800 rounded flex items-center space-x-1">
            <i data-lucide="download" class="w-3.5 h-3.5"></i>
            <span>Tải file</span>
          </button>
        </div>
      </div>
      <textarea id="output-ex" readonly class="flex-1 p-4 text-sm border-none outline-none focus:ring-0 bg-slate-50" placeholder="Mã LaTeX sau khi chuẩn hóa sẽ xuất hiện tại đây..."></textarea>
    </div>

  </main>

  <!-- SCRIPT TIỆN ÍCH COPY & DOWNLOAD -->
  <script>
    function copyOutput() {
      const output = document.getElementById('output-ex');
      if (!output || !output.value.trim()) return;
      output.select();
      navigator.clipboard.writeText(output.value);
      alert('Đã sao chép mã LaTeX vào bộ nhớ tạm!');
    }

    function downloadOutput() {
      const output = document.getElementById('output-ex');
      if (!output || !output.value.trim()) return;
      const blob = new Blob([output.value], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'PimaX_Normalized_LaTeX.tex';
      a.click();
    }
  </script>

  <!-- APP LOGIC SCRIPTS -->
  <script src="js/ex-processor.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
