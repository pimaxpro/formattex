<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LaTeX ex Standardizer</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans flex flex-col">

  <!-- Header & Menu Navigation -->
  <header class="bg-slate-800 border-b border-slate-700 shadow-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center space-x-3">
        <i data-lucide="file-code-2" class="w-8 h-8 text-blue-400"></i>
        <h1 class="text-xl font-bold tracking-wide">LaTeX Standardizer</h1>
      </div>

      <!-- TAB MENU SELECTION -->
      <div class="flex bg-slate-900 p-1 rounded-lg border border-slate-700">
        <button 
          id="btn-mode-1" 
          onclick="switchMode(1)" 
          class="px-4 py-2 text-xs font-semibold rounded-md transition flex items-center space-x-2 bg-blue-600 text-white shadow"
        >
          <i data-lucide="check-square" class="w-4 h-4"></i>
          <span>CN 1: Trắc nghiệm 4 lựa chọn (\choice)</span>
        </button>
        <button 
          id="btn-mode-2" 
          onclick="switchMode(2)" 
          class="px-4 py-2 text-xs font-semibold rounded-md transition flex items-center space-x-2 text-slate-400 hover:text-slate-200"
        >
          <i data-lucide="list-checks" class="w-4 h-4"></i>
          <span>CN 2: Trắc nghiệm Đúng/Sai (\choiceTF)</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 space-y-4 flex flex-col">
    
    <!-- Mode Description Bar -->
    <div id="mode-description" class="bg-slate-800/60 border border-slate-700/60 rounded-lg p-3 text-xs text-slate-300 flex items-center justify-between">
      <span id="desc-text">Đang ở <b>Chức năng 1</b>: Chuyển đổi đề trắc nghiệm dạng 4 phương án A, B, C, D sang <code>\choice</code></span>
      <span class="text-xs text-slate-400 bg-slate-700 px-2.5 py-0.5 rounded-full">v2.3 - Fix Math Spacing</span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-1">
      
      <!-- BOX 1: INPUT TEXT -->
      <div class="flex flex-col space-y-2">
        <div class="flex justify-between items-center text-sm font-semibold text-slate-300">
          <div class="flex items-center space-x-2">
            <i data-lucide="file-input" class="w-4 h-4 text-blue-400"></i>
            <span>Box 1: Text thô cần chuẩn hóa</span>
          </div>
          <div class="flex items-center space-x-3">
            <label class="cursor-pointer text-xs bg-slate-800 hover:bg-slate-700 text-blue-400 px-2.5 py-1 rounded border border-slate-700 transition flex items-center space-x-1">
              <i data-lucide="upload" class="w-3 h-3"></i>
              <span>Tải file</span>
              <input type="file" accept=".tex,.txt" class="hidden" onchange="loadFile(event)">
            </label>
            <button onclick="clearInput()" class="text-xs text-red-400 hover:underline flex items-center space-x-1">
              <i data-lucide="trash-2" class="w-3 h-3"></i>
              <span>Xóa</span>
            </button>
          </div>
        </div>
        <textarea 
          id="input-text" 
          class="w-full flex-1 min-h-[500px] bg-slate-950 border border-slate-800 rounded-lg p-4 font-mono text-sm text-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none shadow-inner" 
          placeholder="Paste đoạn text đề thi / bài tập thô vào đây..."
        ></textarea>
      </div>

      <!-- BOX 2: OUTPUT RESULT -->
      <div class="flex flex-col space-y-2">
        <div class="flex justify-between items-center text-sm font-semibold text-slate-300">
          <div class="flex items-center space-x-2">
            <i data-lucide="file-output" class="w-4 h-4 text-emerald-400"></i>
            <span>Box 2: Kết quả chuẩn hóa dạng cây (\begin{ex})</span>
          </div>
          <div class="flex items-center space-x-3">
            <button onclick="copyToClipboard()" class="text-xs text-blue-400 hover:underline flex items-center space-x-1">
              <i data-lucide="copy" class="w-3 h-3"></i>
              <span>Copy</span>
            </button>
            <button onclick="downloadResult()" class="text-xs text-emerald-400 hover:underline flex items-center space-x-1">
              <i data-lucide="download" class="w-3 h-3"></i>
              <span>Tải .tex</span>
            </button>
          </div>
        </div>
        <textarea 
          id="output-text" 
          readonly 
          class="w-full flex-1 min-h-[500px] bg-slate-950 border border-slate-800 rounded-lg p-4 font-mono text-sm text-emerald-400 focus:outline-none resize-none shadow-inner" 
          placeholder="Kết quả chuẩn hóa dạng cây sẽ xuất hiện tại đây..."
        ></textarea>
      </div>

    </div>

    <!-- Action Bar -->
    <div class="flex justify-end pt-2">
      <button 
        onclick="processMain()" 
        class="bg-blue-600 hover:bg-blue-500 text-white font-medium px-6 py-2.5 rounded-lg transition flex items-center space-x-2 shadow-lg shadow-blue-600/20"
      >
        <i data-lucide="wand-2" class="w-4 h-4"></i>
        <span id="btn-process-label">Chuẩn Hóa Ngay (CN 1)</span>
      </button>
    </div>

  </main>

  <footer class="bg-slate-800 border-t border-slate-700 py-3 text-center text-xs text-slate-400">
    LaTeX Standardizer — Đã sửa hoàn toàn khoảng trắng cách $ với văn bản
  </footer>

  <script>
    lucide.createIcons();

    let currentMode = 1;

    function switchMode(mode) {
      currentMode = mode;
      const btn1 = document.getElementById('btn-mode-1');
      const btn2 = document.getElementById('btn-mode-2');
      const descText = document.getElementById('desc-text');
      const processLabel = document.getElementById('btn-process-label');

      if (mode === 1) {
        btn1.className = "px-4 py-2 text-xs font-semibold rounded-md transition flex items-center space-x-2 bg-blue-600 text-white shadow";
        btn2.className = "px-4 py-2 text-xs font-semibold rounded-md transition flex items-center space-x-2 text-slate-400 hover:text-slate-200";
        descText.innerHTML = "Đang ở <b>Chức năng 1</b>: Chuyển đổi đề trắc nghiệm 4 phương án A, B, C, D sang <code>\\choice</code>";
        processLabel.innerText = "Chuẩn Hóa Ngay (CN 1)";
      } else {
        btn2.className = "px-4 py-2 text-xs font-semibold rounded-md transition flex items-center space-x-2 bg-blue-600 text-white shadow";
        btn1.className = "px-4 py-2 text-xs font-semibold rounded-md transition flex items-center space-x-2 text-slate-400 hover:text-slate-200";
        descText.innerHTML = "Đang ở <b>Chức năng 2</b>: Chuyển đổi đề trắc nghiệm Đúng/Sai a), b), c), d) sang <code>\\choiceTF</code> (Đọc DĐSD/DSDS)";
        processLabel.innerText = "Chuẩn Hóa Ngay (CN 2)";
      }
    }

    function loadFile(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('input-text').value = e.target.result;
      };
      reader.readAsText(file);
    }

    function clearInput() {
      document.getElementById('input-text').value = '';
      document.getElementById('output-text').value = '';
    }

    function copyToClipboard() {
      const textarea = document.getElementById('output-text');
      if (!textarea.value) return;
      textarea.select();
      navigator.clipboard.writeText(textarea.value);
      alert('Đã copy kết quả vào bộ nhớ tạm!');
    }

    function downloadResult() {
      const text = document.getElementById('output-text').value;
      if (!text) return;
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'chuan_hoa_ex.tex';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // TỰ ĐỘNG BỌC $ VÀ BẢO TỒN KHOẢNG TRẮNG CÁCH TỪ TIẾNG VIỆT
    function autoWrapMath(text) {
      if (!text) return '';

      // Tách các đoạn đã nằm trong $...$
      const parts = text.split(/(\$[^\$]+\$)/g);

      for (let i = 0; i < parts.length; i++) {
        if (!parts[i].startsWith('$')) {
          let chunk = parts[i];

          // 1. Bọc khoảng/đoạn chưa có $: (-1;1), [-2;3]
          const intervalRegex = /([\(\[][\-+]?\w+\s*[;\,]\s*[\-+]?\w+[\)\]])/g;
          chunk = chunk.replace(intervalRegex, (match, p1) => ` $${p1}$ `);

          // 2. Bọc biểu thức biến như t = 0 s, t = 2 s
          chunk = chunk.replace(/(?<![\$\w\\])([a-zA-Z]\s*=\s*[\-+]?\d+(?:\s*\\[a-zA-Z]+|\s*\{\~[a-zA-Z]+\}|\s*[a-zA-Z]+)?)(?![\$\w])/g, (m, p1) => ` $${p1.trim()}$ `);

          parts[i] = chunk;
        }
      }

      let result = parts.join('');

      // CHUẨN HÓA KHOẢNG TRẮNG XUNG QUANH DẤU $ TOÁN HỌC
      // 1. Thêm khoảng trắng trước $ mở nếu đứng sau ký tự chữ/số
      result = result.replace(/([a-zA-ZÀ-ỹ0-9])\$([^\$]+)\$/g, '$1 $$2$');

      // 2. Thêm khoảng trắng sau $ đóng nếu đứng trước ký tự chữ Tiếng Việt/chữ cái
      result = result.replace(/\$([^\$]+)\$([a-zA-ZÀ-ỹ0-9])/g, '$$1$ $2');

      // 3. Xóa các khoảng trắng thừa trùng lặp (ví dụ: "  " -> " ")
      result = result.replace(/[ \t]+/g, ' ');

      // 4. Xóa khoảng trắng dính sát trước các dấu chấm, phẩy, ngoặc
      result = result.replace(/\s+([\.,;\)])/g, '$1');
      result = result.replace(/([\(\[])\s+/g, '$1');

      return result.trim();
    }

    function cleanMathSpaces(str) {
      if (!str) return '';
      let res = str.trim();

      res = res.replace(/\$\s+([^$]+)\s+\$/g, (m, p1) => `$${p1.trim()}$`);
      res = res.replace(/\$\s+/g, '$').replace(/\s+\$/g, '$');

      return res;
    }

    // LÀM SẠCH TIỀN TỐ "CÂU X", [MÃ], DẤU HAI CHẤM
    function cleanHeaderPrefix(rawText) {
      let str = rawText.trim();

      str = str.replace(/^Câu\s+\d+\s*[\.\:-]*/i, '').trim();
      str = str.replace(/^\[[^\]]*\]\s*/i, '').trim();
      str = str.replace(/^\([^\)]*\)\s*/i, '').trim();
      str = str.replace(/^[:\.-]+\s*/, '').trim();

      return str;
    }

    function processMain() {
      if (currentMode === 1) {
        processMode1();
      } else {
        processMode2();
      }
    }

    // =========================================================================
    // CHỨC NĂNG 1: Trắc nghiệm A, B, C, D -> \choice
    // =========================================================================
    function processMode1() {
      const input = document.getElementById('input-text').value;
      if (!input.trim()) return;

      const questionBlocks = input.split(/(?=(?:^|\n)\s*Câu\s+\d+)/i).filter(b => b.trim());
      let results = [];

      questionBlocks.forEach(block => {
        let content = cleanHeaderPrefix(block);

        let questionPart = content;
        let solutionPart = "";

        const solutionHeaderRegex = /(?:Lời\s*giải|Hướng\s*dẫn\s*giải)[\.\s:]*/i;
        const solMatch = content.match(solutionHeaderRegex);

        if (solMatch) {
          questionPart = content.substring(0, solMatch.index).trim();
          solutionPart = content.substring(solMatch.index + solMatch[0].length).trim();
        }

        let trueAnswerKey = null;
        const choicePickRegex = /(?:Chọn\s*(?:ý|đáp\s*án)?|Đáp\s*án)\s*([A-D])[\.\s]*/gi;

        let pickMatch;
        if ((pickMatch = choicePickRegex.exec(solutionPart)) !== null) {
          trueAnswerKey = pickMatch[1].toUpperCase();
          solutionPart = solutionPart.replace(/(?:Chọn\s*(?:ý|đáp\s*án)?|Đáp\s*án)\s*[A-D][\.\s]*/gi, '').trim();
        } 
        choicePickRegex.lastIndex = 0;
        if (!trueAnswerKey && (pickMatch = choicePickRegex.exec(questionPart)) !== null) {
          trueAnswerKey = pickMatch[1].toUpperCase();
          questionPart = questionPart.replace(/(?:Chọn\s*(?:ý|đáp\s*án)?|Đáp\s*án)\s*[A-D][\.\s]*/gi, '').trim();
        }

        const choiceRegex = /(?:^|\n)\s*([A-D])\.\s*([\s\S]*?)(?=(?:\n\s*[A-D]\.|$))/g;
        
        let choices = {};
        let matches;
        let firstChoiceIndex = -1;

        while ((matches = choiceRegex.exec(questionPart)) !== null) {
          if (firstChoiceIndex === -1) firstChoiceIndex = matches.index;
          const key = matches[1].toUpperCase();
          let choiceVal = matches[2].trim();
          
          choiceVal = choiceVal.replace(/\.\s*$/, '');
          choiceVal = autoWrapMath(choiceVal);
          choiceVal = cleanMathSpaces(choiceVal);

          choices[key] = choiceVal;
        }

        let mainQuestion = firstChoiceIndex !== -1 ? questionPart.substring(0, firstChoiceIndex).trim() : questionPart;
        mainQuestion = autoWrapMath(mainQuestion);

        let exCode = `\\begin{ex}\n`;
        exCode += `    ${mainQuestion}\n`;
        exCode += `    \\choice\n`;

        ['A', 'B', 'C', 'D'].forEach(key => {
          let optionText = choices[key] || '';
          let isTrue = (key === trueAnswerKey) ? '\\True ' : '';
          exCode += `    {${isTrue}${optionText}}\n`;
        });

        if (solutionPart) {
          const indentedSolution = solutionPart.split('\n').map(line => line ? `        ${line}` : '').join('\n');
          exCode += `    \\loigiai{\n${indentedSolution}\n    }\n`;
        } else {
          exCode += `    \\loigiai{\n\n    }\n`;
        }

        exCode += `\\end{ex}`;
        results.push(exCode);
      });

      document.getElementById('output-text').value = results.join('\n\n');
    }

    // =========================================================================
    // CHỨC NĂNG 2: Trắc nghiệm Đúng/Sai a) b) c) d) -> \choiceTF
    // =========================================================================
    function processMode2() {
      const input = document.getElementById('input-text').value;
      if (!input.trim()) return;

      const questionBlocks = input.split(/(?=(?:^|\n)\s*Câu\s+\d+)/i).filter(b => b.trim());
      let results = [];

      questionBlocks.forEach(block => {
        let content = cleanHeaderPrefix(block);

        let questionPart = content;
        let solutionPart = "";

        const solutionHeaderRegex = /(?:Lời\s*giải|Hướng\s*dẫn\s*giải)[\.\s:]*/i;
        const solMatch = content.match(solutionHeaderRegex);

        if (solMatch) {
          questionPart = content.substring(0, solMatch.index).trim();
          solutionPart = content.substring(solMatch.index + solMatch[0].length).trim();
        }

        let tfPattern = null;
        const answerTFRegex = /(?:Đáp\s*án|Chọn)[\.\s:]*([DĐS[\s\-\,\.]+){4}/i;

        let tfMatch = solutionPart.match(answerTFRegex);
        if (tfMatch) {
          let cleanStr = tfMatch[0].replace(/(?:Đáp\s*án|Chọn)[\.\s:]*/i, '').replace(/[\s\-\,\.]/g, '').toUpperCase();
          if (cleanStr.length === 4) {
            tfPattern = cleanStr.split('').map(ch => (ch === 'D' || ch === 'Đ'));
          }
          solutionPart = solutionPart.replace(answerTFRegex, '').trim();
        } else {
          tfMatch = questionPart.match(answerTFRegex);
          if (tfMatch) {
            let cleanStr = tfMatch[0].replace(/(?:Đáp\s*án|Chọn)[\.\s:]*/i, '').replace(/[\s\-\,\.]/g, '').toUpperCase();
            if (cleanStr.length === 4) {
              tfPattern = cleanStr.split('').map(ch => (ch === 'D' || ch === 'Đ'));
            }
            questionPart = questionPart.replace(answerTFRegex, '').trim();
          }
        }

        const choiceTFRegex = /(?:^|\n)\s*([a-d])[\)\.]\s*([\s\S]*?)(?=(?:\n\s*[a-d][\)\.]|$))/gi;
        
        let choices = {};
        let matches;
        let firstChoiceIndex = -1;

        while ((matches = choiceTFRegex.exec(questionPart)) !== null) {
          if (firstChoiceIndex === -1) firstChoiceIndex = matches.index;
          const key = matches[1].toLowerCase();
          let choiceVal = matches[2].trim();
          
          choiceVal = choiceVal.replace(/\.\s*$/, '');
          choiceVal = autoWrapMath(choiceVal);
          choiceVal = cleanMathSpaces(choiceVal);

          choices[key] = choiceVal;
        }

        let mainQuestion = firstChoiceIndex !== -1 ? questionPart.substring(0, firstChoiceIndex).trim() : questionPart;
        mainQuestion = autoWrapMath(mainQuestion);

        let exCode = `\\begin{ex}\n`;
        exCode += `    ${mainQuestion}\n`;
        exCode += `    \\choiceTF\n`;

        const keys = ['a', 'b', 'c', 'd'];
        keys.forEach((key, index) => {
          let optionText = choices[key] || '';
          let isTrue = (tfPattern && tfPattern[index]) ? '\\True ' : '';
          exCode += `    {${isTrue}${optionText}}\n`;
        });

        if (solutionPart) {
          const indentedSolution = solutionPart.split('\n').map(line => line ? `        ${line}` : '').join('\n');
          exCode += `    \\loigiai{\n${indentedSolution}\n    }\n`;
        } else {
          exCode += `    \\loigiai{\n\n    }\n`;
        }

        exCode += `\\end{ex}`;
        results.push(exCode);
      });

      document.getElementById('output-text').value = results.join('\n\n');
    }
  </script>
</body>
</html>
