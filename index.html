<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PimaX Tool — Chuẩn Hóa Mã LaTeX & Môi Trường Ex</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 h-full flex flex-col font-sans transition-colors duration-200" id="app-body">

  <!-- HEADER / NAVBAR -->
  <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shadow-sm sticky top-0 z-30">
    <div class="flex items-center space-x-3">
      <div class="w-9 h-9 rounded-lg bg-[#db3c6e] text-white flex items-center justify-center font-bold text-lg shadow-sm">
        P
      </div>
      <div>
        <h1 class="font-bold text-base text-gray-800 leading-tight">PimaX Tool</h1>
        <p class="text-xs text-gray-500">Bộ công cụ chuẩn hóa & xử lý tài liệu LaTeX Toán</p>
      </div>
    </div>

    <!-- Thanh chuyển Tab & Darkmode -->
    <div class="flex items-center space-x-3">
      <div class="flex bg-gray-100 p-1 rounded-lg border border-gray-200 text-xs font-medium">
        <button id="tab-btn-ex" onclick="switchMainTab('ex')" class="px-3 py-1.5 rounded-md bg-white text-[#db3c6e] font-semibold shadow-sm transition">
          <i class="fa-solid fa-code-branch mr-1.5"></i>Chuẩn Hóa Ex
        </button>
        <button id="tab-btn-clean" onclick="switchMainTab('clean')" class="px-3 py-1.5 rounded-md text-gray-600 hover:text-gray-900 transition">
          <i class="fa-solid fa-wand-magic-sparkles mr-1.5"></i>Dọn Dẹp Code
        </button>
        <button id="tab-btn-tikz" onclick="switchMainTab('tikz')" class="px-3 py-1.5 rounded-md text-gray-600 hover:text-gray-900 transition">
          <i class="fa-solid fa-shapes mr-1.5"></i>Trích TikZ
        </button>
      </div>

      <button id="theme-toggle-btn" onclick="toggleDarkMode()" class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center text-gray-600 hover:bg-gray-100 transition">
        <i class="fa-solid fa-moon text-sm"></i>
      </button>
    </div>
  </header>

  <!-- MAIN CONTAINER -->
  <main class="flex-1 p-4 md:p-6 overflow-hidden flex flex-col max-w-[1700px] w-full mx-auto">

    <!-- SUB TOOLBAR: CHỌN CHẾ ĐỘ CN1 - CN2 - CN3 -->
    <section id="ex-sub-toolbar" class="mb-4 bg-white p-3 rounded-xl border border-gray-200 shadow-sm flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center space-x-2">
        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider mr-1">Chế độ:</span>
        <button id="sub-btn-1" onclick="switchSubMode(1)" class="px-3 py-1.5 text-xs font-semibold rounded-lg transition flex items-center space-x-1.5 theme-btn-pimax whitespace-nowrap">
          <i class="fa-solid fa-list-check"></i>
          <span>CN 1: Trắc nghiệm 4PA</span>
        </button>
        <button id="sub-btn-2" onclick="switchSubMode(2)" class="px-3 py-1.5 text-xs font-semibold rounded-lg transition flex items-center space-x-1.5 bg-gray-100 text-gray-700 hover:bg-gray-200 whitespace-nowrap">
          <i class="fa-solid fa-square-check"></i>
          <span>CN 2: Đúng / Sai</span>
        </button>
        <button id="sub-btn-3" onclick="switchSubMode(3)" class="px-3 py-1.5 text-xs font-semibold rounded-lg transition flex items-center space-x-1.5 bg-gray-100 text-gray-700 hover:bg-gray-200 whitespace-nowrap">
          <i class="fa-solid fa-pen-to-square"></i>
          <span>CN 3: Trả lời ngắn</span>
        </button>
      </div>

      <div id="sub-mode-desc" class="text-xs text-gray-500 font-medium">
        Chế độ: <b>Trắc nghiệm 4 phương án (\choice)</b>
      </div>
    </section>

    <!-- WORKSPACE / EDITORS SECTION (HAI CỘT) -->
    <div class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-4 min-h-0">

      <!-- CỘT 1: INPUT EDITOR -->
      <div class="flex flex-col bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden h-full">
        <!-- Header Cột Trái -->
        <div class="px-4 py-2.5 bg-gray-50 border-b border-gray-200 flex items-center justify-between">
          <div class="flex items-center space-x-2">
            <i class="fa-solid fa-file-import text-[#db3c6e] text-sm"></i>
            <span class="font-semibold text-xs text-gray-700 uppercase tracking-wider">Dữ liệu thô đầu vào:</span>
          </div>

          <!-- Thanh nút tác vụ Nhanh Cột Trái -->
          <div class="flex items-center space-x-1">
            <button onclick="undoEditor('input-ex')" title="Undo" class="p-1.5 text-gray-500 hover:text-gray-800 rounded hover:bg-gray-200 text-xs">
              <i class="fa-solid fa-rotate-left"></i>
            </button>
            <button onclick="redoEditor('input-ex')" title="Redo" class="p-1.5 text-gray-500 hover:text-gray-800 rounded hover:bg-gray-200 text-xs">
              <i class="fa-solid fa-rotate-right"></i>
            </button>
            <div class="h-3 w-[1px] bg-gray-300 mx-1"></div>
            <label class="px-2 py-1 text-xs font-medium text-gray-600 bg-white border border-gray-300 rounded cursor-pointer hover:bg-gray-50 transition flex items-center space-x-1">
              <i class="fa-solid fa-upload"></i>
              <span>Tải file</span>
              <input type="file" id="file-upload-input" accept=".tex,.txt" class="hidden" onchange="handleFileUpload(event, 'input-ex')">
            </label>
            <button onclick="clearEditor('input-ex')" class="px-2 py-1 text-xs font-medium text-red-600 bg-white border border-gray-300 rounded hover:bg-red-50 transition">
              Xóa
            </button>
          </div>
        </div>

        <!-- Khung Nhập Liệu (Input Editor Container) -->
        <div class="flex-1 relative overflow-hidden flex flex-row editor-wrapper">
          <div id="line-numbers-input-ex" class="line-numbers-sidebar select-none">1</div>
          <textarea 
            id="input-ex" 
            spellcheck="false"
            placeholder="Dán mã LaTeX thô hoặc danh sách câu hỏi tại đây..."
            class="editor-textarea flex-1 p-3 font-mono text-sm resize-none focus:outline-none leading-relaxed"
            onscroll="syncScroll('input-ex')"
            oninput="handleInput('input-ex')"></textarea>
        </div>
      </div>

      <!-- CỘT 2: OUTPUT EDITOR -->
      <div class="flex flex-col bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden h-full">
        <!-- Header Cột Phải -->
        <div class="px-4 py-2.5 bg-gray-50 border-b border-gray-200 flex items-center justify-between">
          <div class="flex items-center space-x-2">
            <i class="fa-solid fa-file-export text-[#db3c6e] text-sm"></i>
            <span class="font-semibold text-xs text-gray-700 uppercase tracking-wider">Kết quả chuẩn hóa:</span>
          </div>

          <!-- Thanh nút tác vụ Cột Phải -->
          <div class="flex items-center space-x-1.5">
            <button onclick="undoEditor('output-ex')" title="Undo" class="p-1.5 text-gray-500 hover:text-gray-800 rounded hover:bg-gray-200 text-xs">
              <i class="fa-solid fa-rotate-left"></i>
            </button>
            <button onclick="redoEditor('output-ex')" title="Redo" class="p-1.5 text-gray-500 hover:text-gray-800 rounded hover:bg-gray-200 text-xs">
              <i class="fa-solid fa-rotate-right"></i>
            </button>
            <div class="h-3 w-[1px] bg-gray-300 mx-1"></div>

            <!-- Nút Thêm Đáp Án -->
            <button onclick="openAnswerModal()" class="px-2.5 py-1 text-xs font-medium text-white bg-[#db3c6e] hover:bg-[#c22e5d] rounded shadow-sm transition flex items-center space-x-1">
              <i class="fa-solid fa-table-cells"></i>
              <span>Thêm đáp án</span>
            </button>

            <!-- Nút Công cụ nhanh -->
            <button onclick="applyCleanSpacingTool('output-ex')" title="Định dạng khoảng cách & dòng" class="p-1.5 text-gray-600 hover:text-[#db3c6e] rounded hover:bg-gray-200 text-xs">
              <i class="fa-solid fa-broom"></i>
            </button>
            <button onclick="applyAutoMath('output-ex')" title="Tự động bọc dấu $" class="p-1.5 text-gray-600 hover:text-[#db3c6e] rounded hover:bg-gray-200 text-xs">
              <i class="fa-solid fa-dollar-sign"></i>
            </button>
            <button onclick="convertArrayToAligned('output-ex')" title="Chuyển array thành aligned" class="p-1.5 text-gray-600 hover:text-[#db3c6e] rounded hover:bg-gray-200 text-xs">
              <i class="fa-solid fa-align-center"></i>
            </button>

            <div class="h-3 w-[1px] bg-gray-300 mx-1"></div>

            <button onclick="copyToClipboard('output-ex')" class="p-1.5 text-gray-600 hover:text-[#db3c6e] rounded hover:bg-gray-200 text-xs" title="Sao chép">
              <i class="fa-regular fa-copy"></i>
            </button>
            <button onclick="downloadOutput('output-ex', 'PimaX_Normalized.tex')" class="p-1.5 text-gray-600 hover:text-[#db3c6e] rounded hover:bg-gray-200 text-xs" title="Tải file .tex">
              <i class="fa-solid fa-download"></i>
            </button>
          </div>
        </div>

        <!-- Khung Kết Quả (Output Editor Container) -->
        <div class="flex-1 relative overflow-hidden flex flex-row editor-wrapper">
          <div id="line-numbers-output-ex" class="line-numbers-sidebar select-none">1</div>
          <textarea 
            id="output-ex" 
            spellcheck="false"
            placeholder="Kết quả chuẩn hóa sẽ xuất hiện tại đây..."
            class="editor-textarea flex-1 p-3 font-mono text-sm resize-none focus:outline-none leading-relaxed"
            onscroll="syncScroll('output-ex')"
            oninput="handleInput('output-ex')"></textarea>
        </div>
      </div>

    </div>

    <!-- MAIN ACTION BUTTON: NÚT CHUẨN HÓA NGAY -->
    <div class="mt-4 flex justify-end">
      <button 
        id="btn-process-ex" 
        onclick="processExEnvironment()" 
        class="px-6 py-2.5 theme-btn-pimax text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition flex items-center space-x-2 text-sm">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span id="btn-ex-label">Chuẩn Hóa Ngay (CN 1)</span>
      </button>
    </div>

  </main>

  <!-- MODAL BẢNG GÁN ĐÁP ÁN (ANSWER MODAL) -->
  <div id="answer-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl shadow-2xl border border-gray-200 w-full max-w-xl overflow-hidden animate-in fade-in zoom-in duration-150">
      <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between bg-gray-50">
        <h3 class="font-bold text-gray-800 text-sm flex items-center space-x-2">
          <i class="fa-solid fa-table-cells text-[#db3c6e]"></i>
          <span>Gán Đáp Án Hàng Loạt</span>
        </h3>
        <button onclick="closeAnswerModal()" class="text-gray-400 hover:text-gray-600">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
      </div>

      <div class="p-6 space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-2">
            Nhập chuỗi đáp án (Ví dụ: 1A 2B 3C hoặc A B C D):
          </label>
          <textarea 
            id="modal-answer-input" 
            rows="4" 
            placeholder="1A 2B 3C 4D... hoặc D S D S..." 
            class="w-full p-3 border border-gray-300 rounded-xl font-mono text-sm focus:outline-none focus:border-[#db3c6e] focus:ring-1 focus:ring-[#db3c6e]"></textarea>
        </div>

        <div class="flex justify-end space-x-3 pt-2">
          <button onclick="closeAnswerModal()" class="px-4 py-2 text-xs font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition">
            Hủy
          </button>
          <button onclick="applyAnswersFromModal()" class="px-5 py-2 text-xs font-semibold text-white theme-btn-pimax rounded-lg shadow transition">
            Gán Ngay
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- CÁC FILE SCRIPT CỦA HỆ THỐNG -->
  <script src="js/editor.js"></script>
  <script src="js/clean-tool.js"></script>
  <script src="js/ex-processor.js"></script>
  <script src="js/tikz-extractor.js"></script>
  <script src="js/pdf-converter.js"></script>
  <script src="js/answer-modal.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
